name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flet
        run: |
          pip install --upgrade pip
          pip install flet[all]

      - name: Build APK
        run: |
          # تنظيف أي ملفات مؤقتة قديمة قد تسبب تعارضاً
          rm -rf build/
          rm -rf .flet/
          
          # أمر البناء المباشر مع الصلاحيات وتخطي الأسئلة
          # لاحظ أننا أزلنا أمر "flet create" لتجنب مسح كودك الأصلي
          yes y | flet build apk --permissions INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE --verbose

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Asala-App-Official
          path: build/apk/*.apk
